version: '3.8'

services:
  cyberchef-playground:
    build:
      context: .
      dockerfile: Dockerfile
    image: cyberchef-playground:latest
    container_name: cyberchef-playground
    restart: unless-stopped
    
    ports:
      - "3000:3000"
    
    environment:
      - NODE_ENV=production
      - PORT=3000
      - CHALLENGES_DIR=/app/challenges

    volumes:
      # Mount synced challenges — run `npm run sync` first, or set CHALLENGES_PATH to an absolute path.
      - ${CHALLENGES_PATH:-./.ccpg-challenges/challenges}:/app/challenges:ro
    
    # Resource limits (adjust based on your needs)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Security options
    security_opt:
      - no-new-privileges:true
    
    # Read-only root filesystem for security
    # (with tmpfs for /tmp if needed)
    read_only: true
    tmpfs:
      - /tmp
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Network
    networks:
      - cyberchef-network

networks:
  cyberchef-network:
    driver: bridge

# Optional: Add volume for persistent data if needed in future
# volumes:
#   challenge-data:
#     driver: local